<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamNode // 设备同步中</title>
    <style>
        body { background-color: #0d0e12; color: #33ff66; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; height: 100vh; justify-content: space-between; }
        .main-card { background: #161822; border: 1px solid #22d3ee; border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(34, 211, 238, 0.15); margin-top: 20px; }
        .title { color: #22d3ee; font-size: 1.1em; font-weight: bold; letter-spacing: 1px; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .device-info { background: #0f111a; padding: 12px; border-radius: 6px; font-size: 0.9em; color: #fff; margin-bottom: 20px; border-left: 4px solid #33ff66; }
        .spinner-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 0; }
        .loader { width: 48px; height: 48px; border: 5px solid #fff; border-bottom-color: #22d3ee; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-text { margin-top: 15px; font-size: 1em; color: #22d3ee; font-weight: 500; }
        .console-logs { background: #000; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 0.75em; color: #888; height: 180px; overflow-y: auto; border: 1px solid #222; }
        .log-line { margin-bottom: 4px; }
        .highlight { color: #33ff66; }
        .error { color: #ef4444; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal { background: #fff; color: #000; width: 80%; max-width: 300px; border-radius: 14px; text-align: center; overflow: hidden; animation: pop 0.3s ease; }
        @keyframes pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-title { font-weight: 600; padding: 20px 20px 5px 20px; font-size: 17px; }
        .modal-text { padding: 0 20px 20px 20px; font-size: 13px; color: #666; border-bottom: 0.5px solid #e5e5e5; }
        .modal-btn { color: #007aff; font-size: 17px; padding: 12px; font-weight: 600; cursor: pointer; background: #fff; border: none; width: 100%; }
        .modal-btn:active { background: #eeeeee; }
    </style>
</head>
<body>
<div>
    <div class="main-card">
        <div class="title">REMOTE SCREEN REPLICATOR</div>
        <div class="device-info" id="device-display">Target Device: Detecting...</div>
        <div class="spinner-box">
            <div class="loader" id="main-loader"></div>
            <div class="status-text" id="status-label">正在初始化投屏向导...</div>
        </div>
    </div>
</div>
<div class="console-logs" id="logs">
    <div>[SYS] Service client initialized.</div>
</div>
<div class="modal-overlay" id="permission-modal">
    <div class="modal">
        <div class="modal-title">屏幕同步请求</div>
        <div class="modal-text">“WebStream v1.2” 正在请求开启此设备的远程屏幕广播权限，用于实时画面推流。</div>
        <button class="modal-btn" onclick="acceptPermission()">允许并广播</button>
    </div>
</div>
<script>
    const logBox = document.getElementById('logs');
    const statusLabel = document.getElementById('status-label');
    const modal = document.getElementById('permission-modal');
    const ua = navigator.userAgent;
    let deviceName = "Mobile Device (Generic)";
    if (/iPhone|iPad|iPod/i.test(ua)) { deviceName = "Apple iOS Device (iPhone)"; }
    else if (/Android/i.test(ua)) { deviceName = "Android OS Device"; }
    document.getElementById('device-display').innerHTML = `<b>Target:</b> ${deviceName}<br><b>Protocol:</b> WebRTC / SFU`;
    function addLog(text, type="") {
        const p = document.createElement('div');
        p.className = `log-line ${type}`;
        p.innerHTML = `[${new Date().toLocaleTimeString()}] ${text}`;
        logBox.appendChild(p);
        logBox.scrollTop = logBox.scrollHeight;
    }
    setTimeout(() => addLog("正在连接握手服务器 (Signal Server)..."), 600);
    setTimeout(() => addLog("握手成功。正在检测本地媒体硬件..."), 1400);
    setTimeout(() => { addLog("<span class='highlight'>[INFO] 触发设备投屏权限安全向导</span>"); modal.classList.add('show'); }, 2200);
    function acceptPermission() {
        modal.classList.remove('show');
        addLog("用户已授权： screen_capture_permission = true", "highlight");
        statusLabel.innerText = "正在建立推流管道 (0%)...";
        setTimeout(() => { statusLabel.innerText = "正在分配流媒体缓冲区 (45%)..."; addLog("分配 P2P 缓冲区: 2048kb success."); }, 1200);
        setTimeout(() => { statusLabel.innerText = "正在尝试挂载图像流 (88%)..."; addLog("正在注入系统级画面捕捉钩子...", "highlight"); }, 2500);
        setTimeout(() => {
            document.getElementById('main-loader').style.borderBottomColor = '#ef4444';
            statusLabel.innerHTML = "<span class='error'>[暂停] 工程尚未完工 (Build 104)</span>";
            addLog("--------------------------------------", "error");
            addLog("[ERROR] 核心推流内核 (DataStream Kernel) 尚未部署。", "error");
            addLog("[ERROR] 当前为前端 Alpha 测试版，后台中继服务器正在构建中...", "error");
            addLog("[SYS] 管道挂起。请等待开发者打通后端接口。", "highlight");
        }, 4500);
    }
</script>
</body>
</html>
