<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuantumLink // Remote Screen Replicator</title>
    <style>
        body {
            background-color: #060709;
            color: #00ff66;
            font-family: -apple-system, BlinkMacSystemFont, 'Courier New', sans-serif;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .header-panel {
            background: #0f111a;
            border: 1px solid #00ff66;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.85em;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.15);
            text-align: center;
        }

        .title-large {
            font-size: 1.6em;
            font-weight: 900;
            letter-spacing: 2px;
            color: #00ff66;
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.6);
            margin: 5px 0;
            text-transform: uppercase;
        }

        /* 核心区域：居中的投屏外壳 */
        .video-sandbox {
            position: relative;
            width: 240px;
            height: 440px;
            background: #000;
            border: 4px solid #a1a1aa;
            border-radius: 36px;
            overflow: hidden;
            margin: 20px auto;
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.3), inset 0 0 20px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 刘海屏效果 */
        .notch {
            position: absolute;
            top: 0;
            width: 120px;
            height: 18px;
            background: #a1a1aa;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            z-index: 100;
        }

        /* 纯 CSS 伪造黑客雪花点矩阵 */
        .noise-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.2), rgba(0,0,0,0.2) 1px, transparent 1px, transparent 2px),
                        repeating-linear-gradient(90deg, rgba(255,255,255,0.15), rgba(255,255,255,0.15) 1px, transparent 1px, transparent 2px);
            animation: static-noise 0.15s infinite;
            opacity: 0.85;
        }

        /* 内部小手机虚线框 */
        .inner-phone-box {
            position: absolute;
            width: 80px;
            height: 140px;
            border: 2px dashed rgba(0, 255, 102, 0.7);
            border-radius: 12px;
            z-index: 5;
        }

        /* 扫描线效果 */
        .scanline {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: rgba(0, 255, 255, 0.8);
            box-shadow: 0 0 12px #00ffff;
            animation: scan 2s linear infinite;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        @keyframes static-noise {
            0% { transform: translate(0,0); }
            50% { transform: translate(-1%, 1%); }
            100% { transform: translate(1%, -1%); }
        }

        /* 大字浮层 */
        .screen-text {
            position: absolute;
            width: 100%;
            text-align: center;
            z-index: 50;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        .main-status-title {
            font-size: 1.8em;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .sub-status-title {
            font-size: 1.0em;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .console-logs {
            background: #000;
            border-radius: 6px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.75em;
            color: #888;
            height: 140px;
            overflow-y: auto;
            border: 1px solid #1e293b;
        }

        .log-line { margin-bottom: 4px; line-height: 1.3; }
        .err { color: #ff3366; font-weight: bold; }
        .succ { color: #00ff66; font-weight: bold; }
        .info { color: #38bdf8; }
    </style>
</head>
<body>

<div>
    <div class="header-panel">
        <div class="title-large">Remote Screen</div>
        <div class="title-large" style="margin-top:-5px;">Replicator</div>
        <div style="margin-top: 8px; color: #a1a1aa; font-size: 0.8em;" id="meta-info">Target: Parsing CoreMedia Protocol...</div>
    </div>

    <div class="video-sandbox">
        <div class="notch"></div>
        <div class="noise-overlay"></div>
        <div class="scanline"></div>
        <div class="inner-phone-box"></div>
        
        <div class="screen-text">
            <div class="main-status-title">对方信号锻炼中</div>
            <div class="sub-status-title">链接已建立 - 正在同步...</div>
        </div>
    </div>
</div>

<div class="console-logs" id="logs">
    <div class="log-line info">LINK_STATUS: ESTABLISHED</div>
    <div class="log-line info">SYNCING_DECRYPTOR_CORE...</div>
    <div class="log-line info">AWAITING_MASTER_CONSOLE_AUTH</div>
    <div class="log-line err">[ERROR] 核心推流内核尚未部署。</div>
    <div class="log-line err">[ERROR] 数据流 (DataStream Build 104) 握手延迟。</div>
    <div class="log-line">[SYS] 管道挂起。请等待开发者打通后端接口。</div>
</div>

<script>
    const logBox = document.getElementById('logs');
    const ua = navigator.userAgent;
    let dev = "Apple iPhone";
    if (/Android/i.test(ua)) dev = "Android Device";
    document.getElementById('meta-info').innerHTML = `Target: ${dev} // Port: 5555 Bound`;

    // 让底部的控制台日志随时间随机滚动，显得更有真实感
    setInterval(() => {
        const p = document.createElement('div');
        p.className = "log-line";
        p.style.color = Math.random() > 0.5 ? "#888" : "#38bdf8";
        p.innerText = `[${new Date().toLocaleTimeString()}] Telemetry frame buffered. Packet ID: ${Math.floor(Math.random()*9000+1000)}`;
        logBox.appendChild(p);
        logBox.scrollTop = logBox.scrollHeight;
    }, 3000);
</script>

</body>
</html>
